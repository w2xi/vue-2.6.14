<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Vue2</title>
  <script src="../dist/vue.js"></script>
</head>
<body>
  <div id="app">{{ msg }}</div>
  <script>
    const ChildComponent = {
      template: `<div>Child Component</div>`,
    }
    const vm = new Vue({
      el: '#app',
      components: {
        ChildComponent
      },
      data: {
        msg: 'watch'
      },
      watch: {
        msg(newVal) {
          console.log(newVal);
        }
      },
      methods: {
        handleClick() {
          this.msg = '123';
        },
      }
    });
    window.vm = vm;
    console.log(vm.$options.components.KeepAlive);
  </script>
</body>
</html>
