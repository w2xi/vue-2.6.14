<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reactivity</title>
  <script src="../../dist/vue.js"></script>
</head>
<body>
  <div id="app">
    {{ msg }}
  </div>
  <script>
    const vm = new Vue({
      el: '#app',
      data: {
        msg: 'Hello Vue.js'
      },
    })

    vm.$watch('msg', (newVal) => {
      console.log('msg changed:', newVal);
    })
    window.vm = vm;
  </script>
</body>
</html>
