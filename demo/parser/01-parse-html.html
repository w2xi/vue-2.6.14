<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>parse HTML</title>
  <script src="../../dist/vue.js"></script>
</head>
<body>
  <div id="app">
    <article><section><div></section></article>
  </div>
  <script>
    const vm = new Vue({
      el: '#app',
      // template: '<article><section><span></section></article>',
      // template: '<article><section></div></section></article>', // </div> 会被忽略
      template: '<div><article><section></section></article>',
      data: {
        msg: 'Hello Vue.js'
      },
    })
    window.vm = vm;
  </script>
</body>
</html>
